ord">from</span> pylab <span class="hljs-keyword">import</span> mpl<br><span class="hljs-keyword">from</span> scipy.optimize <span class="hljs-keyword">import</span> fminbound<br><br><span class="hljs-comment"># 图像显示中文</span><br>mpl.rcParams[<span class="hljs-string">&#x27;font.sans-serif&#x27;</span>] = [<span class="hljs-string">&#x27;Microsoft YaHei&#x27;</span>]<br><br><br><span class="hljs-keyword">class</span> <span class="hljs-title class_">MyLogisticRegression</span>:<br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, max_iter=<span class="hljs-number">10000</span>, distance=<span class="hljs-number">3</span>, epsilon=<span class="hljs-number">1e-6</span></span>):<br>        <span class="hljs-string">&quot;&quot;&quot;</span><br><span class="hljs-string">        Logistic回归</span><br><span class="hljs-string">        :param max_iter: 最大迭代次数 </span><br><span class="hljs-string">        :param distance: 一维搜索的长度范围</span><br><span class="hljs-string">        :param epsilon: 迭代停止阈值</span><br><span class="hljs-string">        &quot;&quot;&quot;</span><br>        self.max_iter = max_iter<br>        self.epsilon = epsilon<br>        <span class="hljs-comment"># 权重</span><br>        self.w = <span class="hljs-literal">None</span><br>        self.distance = distance<br>        self._X = <span class="hljs-literal">None</span><br>        self._y = <span class="hljs-literal">None</span><br><br><span class="hljs-meta">    @staticmethod</span><br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">preprocessing</span>(<span class="hljs-params">X</span>):<br>        <span class="hljs-string">&quot;&quot;&quot;将原始X末尾加上一列，该列数值全部为1&quot;&quot;&quot;</span><br>        row = X.shape[<span class="hljs-number">0</span>]<br>        y = np.ones(row).reshape(row, <span class="hljs-number">1</span>)<br>        <span class="hljs-keyword">return</span> np.hstack((X, y))<br><br><span class="hljs-meta">    @staticmethod</span><br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">sigmoid</span>(<span class="hljs-params">x</span>):<br>        <span class="hljs-keyword">return</span> <span class="hljs-number">1</span> / (<span class="hljs-number">1</span> + np.exp(-x))<br><br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">grad</span>(<span class="hljs-params">self, w</span>):<br>        z = np.dot(self._X, w.T)<br>        grad = self._X * (self._y - self.sigmoid(z))<br>        grad = grad.<span class="hljs-built_in">sum</span>(axis=<span class="hljs-number">0</span>)<br>        <span class="hljs-keyword">return</span> grad<br><br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">likelihood_func</span>(<span class="hljs-params">self, w</span>):<br>        z = np.dot(self._X, w.T)<br>        f = self._y * z - np.log(<span class="hljs-number">1</span> + np.exp(z))<br>        <span class="hljs-keyword">return</span> np.<span class="hljs-built_in">sum</span>(f)<br><br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">fit</span>(<span class="hljs-params">self, data_x, data_y</span>):<br>        self._X = self.preprocessing(data_x)<br>        self._y = data_y.T<br>        <span class="hljs-comment"># （1）取初始化w</span><br>        w = np.array([[<span class="hljs-number">0</span>] * self._X.shape[<span class="hljs-number">1</span>]], dtype=np.<span class="hljs-built_in">float</span>)<br>        k = <span class="hljs-number">0</span><br>        <span class="hljs-comment"># （2）计算f(w)</span><br>        fw = self.likelihood_func(w)<br>        <span class="hljs-keyword">for</span> _ <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(self.max_iter):<br>            <span class="hljs-comment"># 计算梯度g(w)</span><br>            grad = self.grad(w)<br>            <span class="hljs-comment"># （3）当梯度g(w)的模长小于精度时，停止迭代</span><br>            <span class="hljs-keyword">if</span> (np.linalg.norm(grad, axis=<span class="hljs-number">0</span>, keepdims=<span class="hljs-literal">True</span>) &lt; self.epsilon).<span class="hljs-built_in">all</span>():<br>                self.w = w<br>                <span class="hljs-keyword">break</span><br><br>            <span class="hljs-comment"># 梯度方向的一维函数</span><br>            <span class="hljs-keyword">def</span> <span class="hljs-title function_">f</span>(<span class="hljs-params">x</span>):<br>                z = w - np.dot(x, grad)<br>                <span class="hljs-keyword">return</span> -self.likelihood_func(z)<br><br>            <span class="hljs-comment"># （3）进行一维搜索，找到使得函数最大的lambda</span><br>            _<span class="hljs-keyword">lambda</span> = fminbound(f, -self.distance, self.distance)<br><br>            <span class="hljs-comment"># （4）设置w(k+1)</span><br>            <span class="hljs-comment">#梯度更新</span><br>            w1 = w - np.dot(_<span class="hljs-keyword">lambda</span>, grad)<br>            fw1 = self.likelihood_func(w1)<br><br>            <span class="hljs-comment"># （4）当f(w(k+1))-f(w(k))的二范数小于精度，或w(k+1)-w(k)的二范数小于精度</span><br>            <span class="hljs-keyword">if</span> np.linalg.norm(fw1 - fw) &lt; self.epsilon <span class="hljs-keyword">or</span> \<br>                    (np.linalg.norm((w1 - w), axis=<span class="hljs-number">0</span>, keepdims=<span class="hljs-literal">True</span>) &lt; self.epsilon).<span class="hljs-built_in">all</span>():<br>                self.w = w1<br>                <span class="hljs-keyword">break</span><br><br>            <span class="hljs-comment"># （5） 设置k=k+1</span><br>            k += <span class="hljs-number">1</span><br>            w, fw = w1, fw1<br><br>        self.grad_ = grad<br>        self.n_iter_ = k<br>        self.coef_ = self.w[<span class="hljs-number">0</span>][:-<span class="hljs-number">1</span>]<br>        self.intercept_ = self.w[<span class="hljs-number">0</span>][-<span class="hljs-number">1</span>]<br><br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">predict</span>(<span class="hljs-params">self, x</span>):<br>        <span class="hljs-comment">#sigmoid(wx+b)   Z &gt;=0.5   1</span><br>        p = self.sigmoid(np.dot(self.preprocessing(x), self.w.T))<br>        p[np.where(p &gt; <span class="hljs-number">0.5</span>)] = <span class="hljs-number">1</span><br>        p[np.where(p &lt; <span class="hljs-number">0.5</span>)] = <span class="hljs-number">0</span><br>        <span class="hljs-keyword">return</span> p<br><br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">score</span>(<span class="hljs-params">self, X, y</span>):<br>        y_c = self.predict(X)<br>        <span class="hljs-comment"># 计算准确率</span><br>        error_rate = np.<span class="hljs-built_in">sum</span>(np.<span class="hljs-built_in">abs</span>(y_c - y.T)) / y_c.shape[<span class="hljs-number">0</span>]<br>        <span class="hljs-keyword">return</span> <span class="hljs-number">1</span> - error_rate<br><br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">draw</span>(<span class="hljs-params">self, X, y</span>):<br>        <span class="hljs-comment"># 分隔正负实例点</span><br>        y = y[<span class="hljs-number">0</span>]<br>        X_po = X[np.where(y == <span class="hljs-number">1</span>)]<br>        X_ne = X[np.where(y == <span class="hljs-number">0</span>)]<br>        <span class="hljs-comment"># 绘制数据集散点图</span><br>        ax = plt.axes(projection=<span class="hljs-string">&#x27;3d&#x27;</span>)<br>        x_1 = X_po[<span class="hljs-number">0</span>, :]<br>        y_1 = X_po[<span class="hljs-number">1</span>, :]<br>        z_1 = X_po[<span class="hljs-number">2</span>, :]<br>        x_2 = X_ne[<span class="hljs-number">0</span>, :]<br>        y_2 = X_ne[<span class="hljs-number">1</span>, :]<br>        z_2 = X_ne[<span class="hljs-number">2</span>, :]<br>        ax.scatter(x_1, y_1, z_1, c=<span class="hljs-string">&quot;r&quot;</span>, label=<span class="hljs-string">&quot;正实例&quot;</span>)<br>        ax.scatter(x_2, y_2, z_2, c=<span class="hljs-string">&quot;b&quot;</span>, label=<span class="hljs-string">&quot;负实例&quot;</span>)<br>        ax.legend(loc=<span class="hljs-string">&#x27;best&#x27;</span>)<br>        <span class="hljs-comment"># 绘制透明度为0.5的分隔超平面</span><br>        x = np.linspace(-<span class="hljs-number">3</span>, <span class="hljs-number">3</span>, <span class="hljs-number">3</span>)<br>        y = np.linspace(-<span class="hljs-number">3</span>, <span class="hljs-number">3</span>, <span class="hljs-number">3</span>)<br>        x_3, y_3 = np.meshgrid(x, y)<br>        a, b, c, d = self.w[<span class="hljs-number">0</span>]<br>        z_3 = -(a * x_3 + b * y_3 + d) / c<br>        <span class="hljs-comment"># 调节透明度</span><br>        ax.plot_surface(x_3, y_3, z_3, alpha=<span class="hljs-number">0.5</span>)<br>        plt.show()<br><br><br><span class="hljs-keyword">if</span> __name__ == <span class="hljs-string">&#x27;__main__&#x27;</span>:<br>    <span class="hljs-comment"># 训练数据集</span><br>    X_train = np.array([[<span class="hljs-number">3</span>, <span class="hljs-number">3</span>, <span class="hljs-number">3</span>], [<span class="hljs-number">4</span>, <span class="hljs-number">3</span>, <span class="hljs-number">2</span>], [<span class="hljs-number">2</span>, <span class="hljs-number">1</span>, <span class="hljs-number">2</span>], [<span class="hljs-number">1</span>, <span class="hljs-number">1</span>, <span class="hljs-number">1</span>], [-<span class="hljs-number">1</span>, <span class="hljs-number">0</span>, <span class="hljs-number">1</span>], [<span class="hljs-number">2</span>, -<span class="hljs-number">2</span>, <span class="hljs-number">1</span>]])<br>    y_train = np.array([[<span class="hljs-number">1</span>, <span class="hljs-number">1</span>, <span class="hljs-number">1</span>, <span class="hljs-number">0</span>, <span class="hljs-number">0</span>, <span class="hljs-number">0</span>]])<br>    <span class="hljs-comment"># 构建实例，进行训练</span><br>    clf = MyLogisticRegression(epsilon=<span class="hljs-number">1e-6</span>)<br>    clf.fit(X_train, y_train)<br>    clf.draw(X_train, y_train)<br>    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;迭代次数：&#123;&#125;次&quot;</span>.<span class="hljs-built_in">format</span>(clf.n_iter_))<br>    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;梯度：&#123;&#125;&quot;</span>.<span class="hljs-built_in">format</span>(clf.grad_))<br>    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;权重：&#123;&#125;&quot;</span>.<span class="hljs-built_in">format</span>(clf.w[<span class="hljs-number">0</span>]))<br>    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;模型准确率：&#123;:.2%&#125;&quot;</span>.<span class="hljs-built_in">format</span>(clf.score(X_train, y_train)))<br><br></code></pre></td></tr></table></figure>
